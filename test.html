<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background-color: #1a1a2e;
      color: #eee;
      font-size: 16px;
      margin: 24px;
    }
    h1 {
      color: #e94560;
      font-size: 40px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #888;
      font-size: 18px;
      margin-bottom: 32px;
    }
    .card {
      background-color: #16213e;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h2 {
      color: #0f3460;
      font-size: 24px;
      margin-bottom: 8px;
    }
    .highlight {
      background-color: #533483;
      padding: 12px;
      color: #fff;
    }
  </style>
</head>
<body>
  <h1>Fytti</h1>
  <p class="subtitle">The browser that says no.</p>

  <div class="card">
    <h2>No JavaScript</h2>
    <p>WASM only. The future is now.</p>
  </div>

  <div class="card">
    <h2>No Bloat</h2>
    <p>20% of the spec for 90% of the web.</p>
  </div>

  <div class="highlight">
    <p>Parse. Layout. Paint. That's it.</p>
  </div>
</body>
</html>
